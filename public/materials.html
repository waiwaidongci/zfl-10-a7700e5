<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>材料库存台账 - 古籍修复工作室</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div>
      <h1>古籍修复工作室</h1>
      <div class="meta">材料库存台账管理</div>
    </div>
  </header>
  <nav class="tabs" style="padding: 0 28px;">
    <a href="/">修复项目</a>
    <a href="/intakes.html">入库接收登记</a>
    <a href="/materials.html" class="active">材料库存台账</a>
    <a href="/templates.html">修复流程模板</a>
    <a href="/review.html">复核清单</a>
    <a href="/calendar.html">排期日历</a>
  </nav>
  <main>
    <form id="form">
      <h2>新增材料</h2>
      <label>材料名称</label><input name="name" required placeholder="例如：楮皮纸">
      <label>单位</label><input name="unit" required placeholder="例如：张、克、米">
      <label>库存数量</label><input name="quantity" type="number" min="0" required>
      <label>低库存阈值</label><input name="lowStockThreshold" type="number" min="0" required>
      <button type="submit">保存材料</button>
    </form>
    <section>
      <div class="stats" id="stats"></div>
      <div class="grid" id="materials"></div>
    </section>
  </main>
  <script src="/js/materials.js"></script>
</body>
</html>
